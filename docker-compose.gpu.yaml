services:
  chatbot_backend:
    build:
      args:
        CUDA_IMAGE: devel
        LLAMA_CUDA: "ON"
    environment:
      - USE_GPU=true
      - LLM_N_GPU_LAYERS=-1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]