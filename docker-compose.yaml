services:
  chatbot_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_LLM_URL=http://ollama-llm:11434/api/generate
      - OLLAMA_LLM_MODEL=ministral-3:3b
      - MARIADB_HOST=mariadb
      - MARIADB_PORT=3306
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - USE_GPU=false
    depends_on:
      ollama-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy

  chatbot_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./frontend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - BACKEND_URL=http://chatbot_backend:8001
    depends_on:
      - chatbot_backend

  mariadb:
    image: mariadb:11
    container_name: mariadb
    ports:
      - "3306:3306"
    env_file: .env
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      
  ollama-llm:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_llm_data:/root/.ollama

  ollama-init:
    image: alpine:latest
    depends_on:
      - ollama-llm
    command: >
      sh -c "
        apk add --no-cache curl;
        echo 'Waiting for Ollama LLM to start...';
        while ! curl -s http://ollama-llm:11434/api/tags > /dev/null; do sleep 2; done;
        echo 'Ollama LLM is up! Pulling ministral-3:3b (this will take a while)...';
        curl -s -X POST http://ollama-llm:11434/api/pull -d '{\"name\": \"ministral-3:3b\", \"stream\": false}';
        echo
        echo 'All models initialized successfully!';
      "

volumes:
  ollama_llm_data:
  ollama_embed_data:
  mariadb_data:
