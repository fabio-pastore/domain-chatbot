services:
  chatbot_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_LLM_URL=http://ollama-llm:11434/api/generate
      - OLLAMA_LLM_MODEL=ministral-3:3b
      - OLLAMA_EMBEDDING_URL=http://ollama-embed:11434/api/embeddings
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text
    depends_on:
      ollama-init:
        condition: service_completed_successfully
      searxng:
        condition: service_started

  chatbot_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./frontend:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - chatbot_backend

  searxng:
      image: searxng/searxng:latest
      container_name: searxng
      ports:
        - "8080:8080"
      volumes:
        - ./searxng:/etc/searxng:rw
      environment:
        - SEARXNG_SETTINGS_PATH=/etc/searxng/settings.yml
      depends_on:
        - redis
      cap_drop:
        - ALL
      cap_add:
        - CHOWN
        - SETGID
        - SETUID

  redis:
    image: redis:alpine
    container_name: redis
    command: redis-server --save "" --appendonly no # RAM only for speed
      
  ollama-llm:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_llm_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-embed:
    image: ollama/ollama:latest
    ports:
      - "11435:11434" 
    volumes:
      - ollama_embed_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-init:
    image: alpine:latest
    depends_on:
      - ollama-llm
      - ollama-embed
    command: >
      sh -c "
        apk add --no-cache curl;

        echo 'Waiting for Ollama LLM to start...';
        while ! curl -s http://ollama-llm:11434/api/tags > /dev/null; do sleep 2; done;
        echo 'Ollama LLM is up! Pulling ministral-3:3b (this will take a while)...';
        curl -s -X POST http://ollama-llm:11434/api/pull -d '{\"name\": \"ministral-3:3b\", \"stream\": false}';

        echo 'Waiting for Ollama Embed to start...';
        while ! curl -s http://ollama-embed:11434/api/tags > /dev/null; do sleep 2; done;
        echo 'Ollama Embed is up! Pulling nomic-embed-text (this will take a while)...';
        curl -s -X POST http://ollama-embed:11434/api/pull -d '{\"name\": \"nomic-embed-text\", \"stream\": false}';

        echo 'All models initialized successfully!';
      "

volumes:
  ollama_llm_data:
  ollama_embed_data: